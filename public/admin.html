<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PM Admin</title>
  <style>
    :root { font-family: system-ui, sans-serif; color: #1a1a1a; }
    body { max-width: 960px; margin: 0 auto; padding: 1rem 1.25rem 3rem; background: #f6f7f9; }
    h1 { font-size: 1.25rem; margin: 0 0 1rem; }
    .card { background: #fff; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    label { display: block; font-size: .8rem; color: #555; margin-bottom: .25rem; }
    input, select, button { font: inherit; padding: .5rem .6rem; border: 1px solid #ccc; border-radius: 6px; }
    input { width: 100%; max-width: 280px; box-sizing: border-box; }
    button { background: #1a5fb4; color: #fff; border: none; cursor: pointer; }
    button.secondary { background: #555; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .row { display: flex; flex-wrap: wrap; gap: .75rem; align-items: flex-end; margin-bottom: .75rem; }
    .err { color: #b00020; font-size: .9rem; margin: .5rem 0; }
    .stats { display: flex; gap: 1.5rem; flex-wrap: wrap; font-size: .95rem; }
    .stats span { color: #666; }
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    th, td { text-align: left; padding: .5rem .4rem; border-bottom: 1px solid #eee; vertical-align: middle; }
    th { font-size: .75rem; text-transform: uppercase; color: #666; }
    .hidden { display: none !important; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: .5rem; }
  </style>
</head>
<body>
  <div id="login-panel" class="card">
    <h1>Admin sign in</h1>
    <p style="margin:0 0 1rem;color:#555;font-size:.9rem;">Use an account with the <strong>admin</strong> role.</p>
    <div class="row">
      <div>
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="username" />
      </div>
      <div>
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" />
      </div>
      <button type="button" id="btn-login">Sign in</button>
    </div>
    <div id="login-err" class="err hidden"></div>
  </div>

  <div id="app-panel" class="hidden">
    <div class="toolbar">
      <h1>PM Admin</h1>
      <button type="button" class="secondary" id="btn-logout">Sign out</button>
    </div>

    <div class="card">
      <strong>Database summary</strong>
      <div id="stats" class="stats" style="margin-top:.5rem;"></div>
      <div id="stats-err" class="err hidden"></div>
    </div>

    <div class="card">
      <strong>Users</strong>
      <div id="users-err" class="err hidden"></div>
      <div style="overflow-x:auto;margin-top:.75rem;">
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Name</th>
              <th>Role</th>
              <th>Active</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="users-body"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <strong>Create user</strong>
      <div class="row" style="margin-top:.75rem;">
        <div><label>Name</label><input id="nu-name" /></div>
        <div><label>Email</label><input id="nu-email" type="email" /></div>
        <div><label>Password</label><input id="nu-pass" type="password" /></div>
        <div><label>Role</label><select id="nu-role"><option value="tech">tech</option><option value="manager">manager</option><option value="admin">admin</option></select></div>
        <button type="button" id="btn-create">Create</button>
      </div>
      <div id="create-err" class="err hidden"></div>
    </div>
  </div>

  <script>
(function () {
  const TOKEN_KEY = 'pm_admin_token';
  const $ = (id) => document.getElementById(id);

  function token() {
    return sessionStorage.getItem(TOKEN_KEY) || '';
  }

  function authHeaders() {
    const h = { 'Content-Type': 'application/json' };
    const t = token();
    if (t) h['Authorization'] = 'Bearer ' + t;
    return h;
  }

  async function api(path, opts) {
    const res = await fetch(path, { ...opts, headers: { ...authHeaders(), ...(opts.headers || {}) } });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || res.statusText || 'Request failed');
    return data;
  }

  function show(el, msg) {
    el.textContent = msg || '';
    el.classList.toggle('hidden', !msg);
  }

  function panel(login) {
    $('login-panel').classList.toggle('hidden', !login);
    $('app-panel').classList.toggle('hidden', login);
  }

  async function refreshStats() {
    show($('stats-err'), '');
    const s = await api('/auth/admin/stats', { method: 'GET' });
    $('stats').innerHTML =
      '<div>Users: <strong>' + (s.users ?? '—') + '</strong></div>' +
      '<div>Sessions: <span>' + (s.pm_sessions ?? '—') + '</span></div>' +
      '<div>PM items: <span>' + (s.pm_items ?? '—') + '</span></div>';
  }

  async function refreshUsers() {
    show($('users-err'), '');
    const body = $('users-body');
    body.innerHTML = '';
    const rows = await api('/auth/users', { method: 'GET' });
      for (const u of rows) {
        const tr = document.createElement('tr');
        tr.innerHTML =
          '<td>' + escapeHtml(u.email) + '</td>' +
          '<td>' + escapeHtml(u.full_name) + '</td>' +
          '<td><select data-id="' + u.id + '" class="role-sel">' +
            ['tech','manager','admin'].map(function (r) {
              return '<option value="' + r + '"' + (u.role === r ? ' selected' : '') + '>' + r + '</option>';
            }).join('') +
          '</select></td>' +
          '<td><input type="checkbox" class="active-cb" data-id="' + u.id + '"' + (u.is_active ? ' checked' : '') + ' /></td>' +
          '<td><button type="button" class="btn-pw secondary" data-id="' + u.id + '">Set password</button></td>';
        body.appendChild(tr);
      }
      body.querySelectorAll('.role-sel').forEach(function (sel) {
        sel.addEventListener('change', function () {
          patchUser(sel.dataset.id, { role: sel.value });
        });
      });
      body.querySelectorAll('.active-cb').forEach(function (cb) {
        cb.addEventListener('change', function () {
          patchUser(cb.dataset.id, { is_active: cb.checked });
        });
      });
      body.querySelectorAll('.btn-pw').forEach(function (btn) {
        btn.addEventListener('click', function () {
          const p = window.prompt('New password (min 8 characters):');
          if (p === null) return;
          if (p.length < 8) { alert('Password too short'); return; }
          patchUser(btn.dataset.id, { password: p });
        });
      });
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  async function patchUser(id, body) {
    try {
      await api('/auth/users/' + encodeURIComponent(id), { method: 'PATCH', body: JSON.stringify(body) });
      await refreshUsers();
    } catch (e) {
      alert(e.message);
      await refreshUsers();
    }
  }

  async function doLogin() {
    show($('login-err'), '');
    const email = $('email').value.trim().toLowerCase();
    const password = $('password').value;
    try {
      const data = await api('/auth/login', {
        method: 'POST',
        body: JSON.stringify({ email, password }),
        headers: { 'Content-Type': 'application/json' },
      });
      if (!data.token || !data.user) throw new Error('Invalid response');
      if (data.user.role !== 'admin') throw new Error('This account is not an admin.');
      sessionStorage.setItem(TOKEN_KEY, data.token);
      panel(false);
      try {
        await refreshStats();
        await refreshUsers();
      } catch (err) {
        sessionStorage.removeItem(TOKEN_KEY);
        panel(true);
        show($('login-err'), err.message || 'Session invalid');
      }
    } catch (e) {
      show($('login-err'), e.message);
    }
  }

  $('btn-login').addEventListener('click', doLogin);
  $('password').addEventListener('keydown', function (ev) { if (ev.key === 'Enter') doLogin(); });

  $('btn-logout').addEventListener('click', function () {
    sessionStorage.removeItem(TOKEN_KEY);
    panel(true);
  });

  $('btn-create').addEventListener('click', async function () {
    show($('create-err'), '');
    const full_name = $('nu-name').value.trim();
    const email = $('nu-email').value.trim().toLowerCase();
    const password = $('nu-pass').value;
    const role = $('nu-role').value;
    try {
      await api('/auth/users', {
        method: 'POST',
        body: JSON.stringify({ full_name, email, password, role }),
      });
      $('nu-name').value = '';
      $('nu-email').value = '';
      $('nu-pass').value = '';
      await refreshUsers();
      await refreshStats();
    } catch (e) {
      show($('create-err'), e.message);
    }
  });

  (async function boot() {
    if (!token()) return;
    panel(false);
    try {
      await refreshStats();
      await refreshUsers();
    } catch (e) {
      sessionStorage.removeItem(TOKEN_KEY);
      panel(true);
    }
  })();
})();
  </script>
</body>
</html>
